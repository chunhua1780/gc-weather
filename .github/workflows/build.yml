name: Build APK
on:
  push:
    branches: [main]
permissions:
  contents: write
jobs:
  build:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4
    - uses: actions/setup-java@v4
      with:
        java-version: '17'
        distribution: 'temurin'
    - uses: actions/setup-node@v4
      with:
        node-version: '18'
    - name: Install Cordova
      run: npm install -g cordova
    - name: Build APK
      run: |
        cordova create app com.gc.weather "天气"
        cp index.html app/www/index.html
        cd app
        cordova platform add android
        sed -i 's|</widget>|    <preference name="android-windowSoftInputMode" value="adjustResize"/>\n    <preference name="Orientation" value="portrait"/>\n</widget>|' config.xml
        cordova build android
    - name: Find APK
      run: find . -name "*.apk" 2>/dev/null
    - uses: actions/upload-artifact@v4
      with:
        name: 天气-APK
        path: '**/*.apk'
        retention-days: 30
    - name: Publish release (public download link)
      uses: softprops/action-gh-release@v2
      with:
        tag_name: latest
        name: 天气 - 最新版
        body: 自动构建 · commit ${{ github.sha }}
        files: '**/*.apk'
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
